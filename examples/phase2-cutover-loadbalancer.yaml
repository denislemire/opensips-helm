# Phase 2 - single-VIP cutover.
# Prerequisite: move the PBX behind a ClusterIP or headless Service.
# Do NOT apply until Phase 1 is verified in-cluster.

opensips:
  service:
    type: LoadBalancer
    loadBalancerIP: "192.0.2.60"

rtpengine:
  mode: distributed
  replicaCount: 4
  service:
    type: LoadBalancer
    loadBalancerIP: "192.0.2.60"
  media:
    advertisedIp: "198.51.100.10"

registration:
  enabled: true
  registrar: sip.provider.example
  existingSecret: carrier-registration

sip:
  advertisedFqdn: sip.example.com

peers:
  asterisk:
    enabled: true
    host: pbx.telephony.svc.cluster.local
