# Phase 2 — single-VIP cutover (OpenSIPS steals Asterisk's MetalLB IP).
# EhWS uses split edge instead — see phase2-split-edge-dual-vip.yaml (Asterisk keeps .60).
# Prerequisite: demote asterisk Service to ClusterIP in ehws-infra (separate PR).
# Do NOT apply until Phase 1 is verified in-cluster.

opensips:
  service:
    type: LoadBalancer
    loadBalancerIP: "192.168.50.60"

rtpengine:
  mode: distributed
  replicaCount: 4
  service:
    type: LoadBalancer
    loadBalancerIP: "192.168.50.60"
  media:
    advertisedIp: "192.168.50.60"

registration:
  enabled: true
  registrar: montreal6.voip.ms
  existingSecret: voipms-opensips-reg

sip:
  advertisedFqdn: sip.ehws.generic.business

peers:
  asterisk:
    enabled: true
    host: asterisk.asterisk.svc.cluster.local
