# Phase 1 - bootstrap OpenSIPS and RTPEngine using ClusterIP Services.
# Install into a dedicated namespace; all Services stay ClusterIP.

opensips:
  image:
    repository: registry.example.com/telephony/opensips
    tag: "latest"
  service:
    type: ClusterIP

rtpengine:
  enabled: true
  mode: distributed
  replicaCount: 4
  discovery: dns
  image:
    repository: registry.example.com/telephony/rtpengine
    tag: "mr11.5.1.4"
  service:
    type: ClusterIP
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/component
                operator: In
                values:
                  - rtpengine
          topologyKey: kubernetes.io/hostname

peers:
  asterisk:
    enabled: true
    host: pbx.telephony.svc.cluster.local
    port: 5060

registration:
  enabled: false

sip:
  advertisedFqdn: sip.example.com
