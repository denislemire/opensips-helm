# One-shot Kaniko build — push OpenSIPS image from cluster (no local Docker required).
#
# Prerequisites:
#   - Namespace opensips
#   - registry-push-auth Secret containing a Docker config.json
#
# Usage:
#   kubectl apply -f scripts/kaniko-build-job.yaml
#   kubectl -n opensips wait job/build-opensips-image --for=condition=complete --timeout=45m
#   kubectl -n opensips logs job/build-opensips-image -c kaniko
#
---
apiVersion: batch/v1
kind: Job
metadata:
  name: build-opensips-image
  namespace: opensips
  annotations:
    flux.weave.works/ignore: "true"
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: git-clone
          image: alpine/git:2.45.2
          args:
            - clone
            - --depth
            - "1"
            - --branch
            - "v0.1.19"
            - https://github.com/denislemire/opensips-helm.git
            - /workspace
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      containers:
        - name: kaniko
          image: gcr.io/kaniko-project/executor:v1.23.2
          args:
            - --dockerfile=/workspace/docker/Dockerfile
            - --context=/workspace
            - --destination=registry.example.com/telephony/opensips:0.1.19
            - --build-arg=OPENSIPS_VERSION=0.1.19
            - --cache=true
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: docker-config
              mountPath: /kaniko/.docker
              readOnly: true
          env:
            - name: DOCKER_CONFIG
              value: /kaniko/.docker
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 4Gi
      volumes:
        - name: workspace
          emptyDir: {}
        - name: docker-config
          secret:
            secretName: registry-push-auth
            items:
              - key: .dockerconfigjson
                path: config.json
