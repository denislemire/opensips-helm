{{- if eq (include "opensips.rtpengineDistributed" .) "true" }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "opensips.rtpengineStatefulSetName" . }}
  labels:
    {{- include "opensips.labels" . | nindent 4 }}
    app.kubernetes.io/component: rtpengine
spec:
  serviceName: {{ include "opensips.fullname" . }}-rtpengine-headless
  replicas: {{ .Values.rtpengine.replicaCount }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "opensips.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: rtpengine
  template:
    metadata:
      labels:
        {{- include "opensips.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: rtpengine
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.rtpengine.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.rtpengine.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.rtpengine.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.rtpengine.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: rtpengine
          image: {{ include "opensips.rtpengineImage" . | quote }}
          imagePullPolicy: {{ .Values.rtpengine.image.pullPolicy }}
          args:
            - --foreground
            - --listen-ng=0.0.0.0:{{ .Values.rtpengine.service.controlPort }}
            - --port-min={{ .Values.rtpengine.service.portRange.start }}
            - --port-max={{ .Values.rtpengine.service.portRange.end }}
            - --interface=0.0.0.0
            {{- range .Values.rtpengine.extraArgs }}
            - {{ . }}
            {{- end }}
          ports:
            - name: ng-control
              containerPort: {{ .Values.rtpengine.service.controlPort }}
              protocol: UDP
          {{- with .Values.rtpengine.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.rtpengine.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "opensips.fullname" . }}-rtpengine-headless
  labels:
    {{- include "opensips.labels" . | nindent 4 }}
    app.kubernetes.io/component: rtpengine
spec:
  clusterIP: None
  selector:
    {{- include "opensips.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: rtpengine
  ports:
    - name: ng-control
      port: {{ .Values.rtpengine.service.controlPort }}
      targetPort: ng-control
      protocol: UDP
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "opensips.fullname" . }}-rtpengine
  labels:
    {{- include "opensips.labels" . | nindent 4 }}
    app.kubernetes.io/component: rtpengine
  {{- with .Values.rtpengine.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.rtpengine.service.type }}
  {{- if and (eq .Values.rtpengine.service.type "LoadBalancer") .Values.rtpengine.service.loadBalancerIP }}
  loadBalancerIP: {{ .Values.rtpengine.service.loadBalancerIP | quote }}
  {{- end }}
  selector:
    {{- include "opensips.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: rtpengine
  ports:
    {{- $start := int .Values.rtpengine.service.portRange.start -}}
    {{- $end := int .Values.rtpengine.service.portRange.end -}}
    {{- range $p := until (int (add (sub $end $start) 1)) }}
    - name: rtp-udp-{{ add $start $p }}
      port: {{ add $start $p }}
      targetPort: {{ add $start $p }}
      protocol: UDP
    {{- end }}
{{- end }}
