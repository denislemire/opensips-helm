{{- if and .Values.mariadb.enabled (not .Values.mariadb.auth.existingSecret) }}
{{- $secretName := include "opensips.mariadbSecretName" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $rootPassword := .Values.mariadb.auth.rootPassword }}
{{- $password := .Values.mariadb.auth.password }}
{{- if and (not $rootPassword) $existing }}
{{- $rootPassword = index $existing.data .Values.mariadb.auth.rootPasswordKey | b64dec }}
{{- end }}
{{- if and (not $password) $existing }}
{{- $password = index $existing.data .Values.mariadb.auth.passwordKey | b64dec }}
{{- end }}
{{- if not $rootPassword }}
{{- $rootPassword = randAlphaNum 32 }}
{{- end }}
{{- if not $password }}
{{- $password = randAlphaNum 32 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "opensips.labels" . | nindent 4 }}
    app.kubernetes.io/component: mariadb
type: Opaque
stringData:
  {{ .Values.mariadb.auth.rootPasswordKey }}: {{ $rootPassword | quote }}
  {{ .Values.mariadb.auth.passwordKey }}: {{ $password | quote }}
{{- end }}
